# ============================================================================
# SonarQube Configuration for MERN Stack Application
# ============================================================================
# This file configures SonarQube scanner for analyzing both frontend (React)
# and backend (Node.js/Express) code quality
# ============================================================================

# ============================================================================
# Project Configuration
# ============================================================================

# Unique project identifier (must be unique in SonarQube instance)
sonar.projectKey=mern-app

# Project display name
sonar.projectName=MERN Stack Application

# Project version (recommended to use build number or git tag)
sonar.projectVersion=1.0.0

# Project description
sonar.projectDescription=Production-ready MERN (MongoDB, Express, React, Node.js) stack application with game theory simulations

# ============================================================================
# Source Code Configuration
# ============================================================================

# Base directory of the project (relative to sonar-project.properties location)
sonar.sources=client/src,server/src

# Root of the directories to analyze
sonar.sourceEncoding=UTF-8

# ============================================================================
# Frontend (React) Configuration
# ============================================================================

# Include React/JavaScript files
sonar.inclusions=**/*.js,**/*.jsx,**/*.ts,**/*.tsx

# Exclude node_modules, dist, build, coverage
sonar.exclusions=**/node_modules/**,**/dist/**,**/build/**,**/.next/**,**/coverage/**,**/*.test.js,**/*.spec.js

# ============================================================================
# Backend (Node.js) Configuration
# ============================================================================

# Include backend JavaScript files
sonar.inclusions=server/src/**/*.js

# Exclude node_modules and tests from backend
sonar.exclusions=server/node_modules/**,server/**/*.test.js,server/**/*.spec.js

# ============================================================================
# Code Coverage Configuration (Optional)
# ============================================================================

# Uncomment if you have LCOV coverage reports
# sonar.javascript.lcov.reportPaths=client/coverage/lcov.info,server/coverage/lcov.info

# ============================================================================
# Test Configuration (Optional)
# ============================================================================

# Include test files for analysis
# sonar.tests=client/src,server/src
# sonar.test.inclusions=**/*.test.js,**/*.spec.js

# ============================================================================
# JavaScript/TypeScript Specific Settings
# ============================================================================

# Node globals
sonar.javascript.globals=process,require,module,__dirname,__filename,Buffer

# Enable TypeScript support if using TypeScript
# sonar.typescript.tsconfigPath=./tsconfig.json

# ============================================================================
# Analysis Configuration
# ============================================================================

# CPU cores to use (0 = auto-detect)
sonar.host.workers=0

# Timeout for analysis (in seconds)
sonar.projectBaseDir=.

# ============================================================================
# SonarQube Server Configuration
# ============================================================================

# SonarQube server URL (overridden by -Dsonar.host.url in Jenkins)
# sonar.host.url=http://localhost:9000

# Authentication token (overridden by -Dsonar.login in Jenkins)
# sonar.login=YOUR_SONAR_TOKEN_HERE

# ============================================================================
# Quality Gate Configuration
# ============================================================================

# Fail analysis if quality gate fails (set false to allow failures)
sonar.qualitygate.wait=true

# ============================================================================
# Additional Settings
# ============================================================================

# Organization (if using SonarCloud)
# sonar.organization=my-org

# Branch analysis (for multi-branch projects)
# sonar.branch.name=main
# sonar.branch.target=main

# Pull request decoration (if using)
# sonar.pullrequest.key=PR-123
# sonar.pullrequest.branch=feature-branch
# sonar.pullrequest.base=main

# ============================================================================
# END - sonar-project.properties
# ============================================================================
