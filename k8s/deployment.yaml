apiVersion: apps/v1
kind: Deployment
metadata:
  name: mern-app
  namespace: mern
  labels:
    app: mern-app
spec:
  replicas: 2
  revisionHistoryLimit: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: mern-app
  template:
    metadata:
      labels:
        app: mern-app
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "5000"
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000

      containers:
      - name: mern-app
        image: dushyanth25/mern-app:53
        imagePullPolicy: Always          # Always pull — critical for Minikube

        ports:
        - name: http
          containerPort: 5000
          protocol: TCP

        # Load non-secret config
        envFrom:
        - configMapRef:
            name: mern-app-config
        # Load secrets
        - secretRef:
            name: mern-app-secrets

        # Downward API extras
        env:
        - name: POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: POD_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace

        # Liveness: restart if app hangs
        livenessProbe:
          httpGet:
            path: /api/health
            port: http
          initialDelaySeconds: 60       # Give app time to connect to MongoDB
          periodSeconds: 15
          timeoutSeconds: 5
          failureThreshold: 5

        # Readiness: only send traffic when truly ready
        readinessProbe:
          httpGet:
            path: /api/health
            port: http
          initialDelaySeconds: 20
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 3

        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 512Mi

        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: false
          runAsNonRoot: true
          runAsUser: 1000
          capabilities:
            drop:
            - ALL

      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app
                  operator: In
                  values:
                  - mern-app
              topologyKey: kubernetes.io/hostname

      restartPolicy: Always
      terminationGracePeriodSeconds: 30