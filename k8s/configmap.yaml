apiVersion: v1
kind: ConfigMap
metadata:
  name: mern-app-config
  namespace: mern
  labels:
    app: mern-app
    component: backend
data:
  # Runtime environment variables for Node.js backend
  NODE_ENV: "production"
  PORT: "5000"
  # API Configuration
  API_URL: "http://localhost:5000"
  # CORS Configuration
  CORS_ORIGIN: "*"
  # Service endpoints (adjust as needed)
  LOG_LEVEL: "info"
