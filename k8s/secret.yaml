apiVersion: v1
kind: Secret
metadata:
  name: mern-app-secrets
  namespace: mern
  labels:
    app: mern-app
    component: backend
type: Opaque

stringData:
  # MongoDB connection string (replace during deployment)
  MONGO_URI: "REPLACE_MONGO_URI"

  # JWT authentication secret
  JWT_SECRET: "REPLACE_JWT_SECRET"

  # Third-party API keys
  GROQ_API_KEY: "REPLACE_GROQ_API_KEY"