apiVersion: v1
kind: ServiceAccount
metadata:
  name: mern-app
  namespace: mern
  labels:
    app: mern-app

---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: mern-app-role
  namespace: mern
rules:
# Pod metadata read access
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["get", "list", "watch"]
# ConfigMap read access
- apiGroups: [""]
  resources: ["configmaps"]
  verbs: ["get", "list"]
# Secrets read access (if needed for the app)
- apiGroups: [""]
  resources: ["secrets"]
  verbs: ["get", "list"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: mern-app-rolebinding
  namespace: mern
subjects:
- kind: ServiceAccount
  name: mern-app
  namespace: mern
roleRef:
  kind: Role
  name: mern-app-role
  apiGroup: rbac.authorization.k8s.io
