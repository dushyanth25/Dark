apiVersion: v1
kind: Service
metadata:
  name: mern-app-service
  namespace: mern
  labels:
    app: mern-app
    component: backend
spec:
  type: NodePort  # Use LoadBalancer for cloud (AWS, GCP, Azure)
  selector:
    app: mern-app
  ports:
  - name: http
    port: 80              # Service port
    targetPort: 5000      # Container port
    protocol: TCP
    nodePort: 30000       # NodePort range: 30000-32767 (optional, auto-assigned if omitted)
  sessionAffinity: ClientIP
  sessionAffinityConfig:
    clientIP:
      timeoutSeconds: 10800

---
